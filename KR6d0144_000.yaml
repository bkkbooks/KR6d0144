front:
  text: 禪波羅蜜序禪波羅蜜者輔行云次第禪門目録云大師於瓦官寺説也大莊嚴寺法慎私記章安頂禪師治定為十卷開十大章一大意二釋名三明門四詮次五法心六方便七修證八果報九起教十歸趣但至修證餘三略無於修證中又開四別一世間禪二亦世間亦出世間三出世間四非世間非出世間四中唯至第三出世復為二一對治無漏二緣理無漏但至對治又為九謂九想八念十想背捨勝處一切處九次第定奮迅超越然修證之相豈可盡具傳曰大師嘗在高座云若説次第禪門年可一遍若著章疏可五十卷今刊預示大科庶學者不昧始末云十大章初修禪波羅蜜大意第一卷上下二釋禪波羅蜜名三明禪波羅蜜門四辨禪波羅蜜詮次五簡禪波羅蜜法心六分別禪波羅蜜前方便二初外方便第二卷二內方便二初正明因止發內外善根第三卷上下二明驗惡根性第四卷七釋禪波羅蜜修證四初修證世間禪相三初四禪第五卷二四無量心第六卷三四無色定二修證亦世間亦出世間禪相三初六妙門第七卷二十六特勝三通明第八卷三修證出世間禪相二初對治無漏九觀壞法第九卷初九想二八念三十想觀不壞法第十卷四八背捨五八勝處六十一切處鍊七九次第定薰八師子奮迅三昧修九超越三昧二緣理無漏不説四修證非世間非出世間禪相八顯示禪波羅蜜果報九從禪波羅蜜起教十結會禪波羅蜜歸趣
